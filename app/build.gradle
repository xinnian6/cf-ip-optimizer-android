plugins {
    id "com.android.application"
}

def debugKeystorePath = System.getenv("DEBUG_KEYSTORE") ?: "${System.getProperty("user.home")}/.android/debug.keystore"

android {
    namespace "com.cfoptimizer.mobile"
    compileSdk 35

    signingConfigs {
        debug {
            storeFile file(debugKeystorePath)
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
    }

    defaultConfig {
        applicationId "com.cfoptimizer.mobile"
        minSdk 26
        targetSdk 35
        versionCode 23
        versionName "1.23"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
    }
}
